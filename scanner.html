<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>URL Scanner</title>

<style>
    :root {
        --bg: #f5f5f7;
        --card-bg: #ffffff;
        --text: #1d1d1f;
        --subtle-text: #6e6e73;
        --accent: #0071e3;
        --radius: 14px;
        --shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 40px 20px;
    }

    .container {
        width: 100%;
        max-width: 520px;
        background: var(--card-bg);
        padding: 40px 32px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        text-align: center;
    }

    h1 {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 10px;
    }

    p.subtitle {
        font-size: 15px;
        color: var(--subtle-text);
        margin-bottom: 30px;
    }

    input[type="text"] {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        border: 1px solid #d2d2d7;
        border-radius: var(--radius);
        outline: none;
        transition: border 0.2s ease;
    }

    input[type="text"]:focus {
        border-color: var(--accent);
    }

    button {
        width: 100%;
        margin-top: 18px;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 500;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
        background: #0a84ff;
    }

    button:active {
        transform: scale(0.98);
    }

    .result {
        margin-top: 30px;
        padding: 20px;
        background: #fafafa;
        border-radius: var(--radius);
        font-size: 15px;
        text-align: left;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid #e5e5e5;
    }

    .loading {
        margin-top: 20px;
        font-size: 14px;
        color: var(--subtle-text);
        display: none;
    }
</style>
</head>

<body>
<div class="container">
    <h1>URL Scanner</h1>
    <p class="subtitle">Enter a URL and send it to the scanner workflow.</p>

    <input id="urlInput" type="text" placeholder="https://example.com" />

    <button onclick="sendToScanner()">Scan URL</button>

    <div id="loading" class="loading">Scanning…</div>
    <div id="result" class="result" style="display:none;"></div>
</div>

<script>
async function sendToScanner() {
    const url = document.getElementById("urlInput").value.trim();
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    result.style.display = "none";
    loading.style.display = "block";
    loading.textContent = "Scanning…";

    if (!url) {
        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = "Please enter a valid URL.";
        return;
    }

    try {
        const response = await fetch("https://scanner-proxy-eqtk.onrender.com/scan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url })
        });

        const text = await response.text();

        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = "Response:\n" + text;

    } catch (err) {
        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = "Error:\n" + err.message;
    }
}
</script>

</body>
</html>
