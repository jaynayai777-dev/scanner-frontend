<script>
async function sendToN8N() {
    const url = document.getElementById("urlInput").value.trim();
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    result.style.display = "none";
    loading.style.display = "block";
    loading.textContent = "Submitting URL…";

    if (!url) {
        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = "Please enter a valid URL.";
        return;
    }

    try {
        // 1. Trigger n8n (which triggers Colab and returns job_id + colab_url)
        const response = await fetch("https://n8n-scanner-jd5c.onrender.com/webhook/scan-url", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url })
        });

        if (!response.ok) {
            throw new Error("n8n returned an error");
        }

        const data = await response.json();
        const jobId = data.job_id;
        const colabUrl = data.colab_url;

        loading.textContent = "Audit started…";

        // 2. Start streaming from Colab using the job ID
        streamAudit(jobId, colabUrl);

    } catch (err) {
        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = "Error:\n" + err.message;
    }
}

function streamAudit(jobId, colabUrl) {
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    result.style.display = "block";
    result.textContent = "";
    loading.textContent = "Connecting to audit stream…";

    const streamUrl = `${colabUrl}/generate_stream?job_id=${jobId}`;
    const source = new EventSource(streamUrl);

    source.addEventListener("start", () => {
        loading.textContent = "Audit initializing…";
    });

    source.addEventListener("progress", (event) => {
        const data = JSON.parse(event.data);
        loading.textContent = `Processing… Status: ${data.status}`;
    });

    source.addEventListener("complete", (event) => {
        const data = JSON.parse(event.data);
        loading.style.display = "none";

        result.textContent = JSON.stringify(data, null, 2);
        source.close();
    });

    source.addEventListener("error", () => {
        loading.style.display = "none";
        result.textContent += "\\n\\n[Stream error or connection closed]";
        source.close();
    });
}
</script>
