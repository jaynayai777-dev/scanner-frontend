<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEO Audit Scanner</title>

<!-- Comfortaa Font -->
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #f5f5f7;
        --card-bg: #ffffff;
        --text: #1d1d1f;
        --subtle-text: #6e6e73;
        --accent: #0071e3;
        --radius: 16px;
        --shadow: 0 10px 30px rgba(0,0,0,0.06);
        --border: #e5e5e7;
    }

    body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family: "Comfortaa", sans-serif;
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 40px 20px;
    }

    .container {
        width: 100%;
        max-width: 560px;
        background: var(--card-bg);
        padding: 42px 36px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        text-align: center;
    }

    h1 {
        font-size: 30px;
        font-weight: 600;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
    }

    p.subtitle {
        font-size: 15px;
        color: var(--subtle-text);
        margin-bottom: 32px;
    }

    input[type="text"] {
        width: 100%;
        padding: 16px 18px;
        font-size: 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        outline: none;
        transition: border 0.2s ease;
        font-family: "Comfortaa", sans-serif;
    }

    input[type="text"]:focus {
        border-color: var(--accent);
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 16px 18px;
        font-size: 17px;
        font-weight: 600;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background 0.2s ease, transform 0.1s ease;
        font-family: "Comfortaa", sans-serif;
    }

    button:hover {
        background: #0a84ff;
    }

    button:active {
        transform: scale(0.98);
    }

    .loading {
        margin-top: 24px;
        font-size: 15px;
        color: var(--subtle-text);
        display: none;
    }

    .result {
        margin-top: 32px;
        padding: 22px;
        background: #fafafa;
        border-radius: var(--radius);
        font-size: 14px;
        text-align: left;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid var(--border);
        display: none;
    }
</style>
</head>

<body>
<div class="container">
    <h1>SEO Audit Scanner</h1>
    <p class="subtitle">Enter a URL and watch the audit generate in real time.</p>

    <input id="urlInput" type="text" placeholder="https://example.com" />

    <button onclick="startAudit()">Run Audit</button>

    <div id="loading" class="loading">Preparing audit…</div>
    <div id="result" class="result"></div>
</div>

<script>
async function startAudit() {
    const url = document.getElementById("urlInput").value.trim();
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    result.style.display = "none";
    loading.style.display = "block";
    loading.textContent = "Submitting URL…";

    if (!url) {
        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = "Please enter a valid URL.";
        return;
    }

    try {
        // 1. Start async job
        const response = await fetch("https://portions-proudly-louisville-pan.trycloudflare.com/generate_async", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sections: { url } })
        });

        const data = await response.json();
        const jobId = data.job_id;

        loading.textContent = "Audit started…";

        // 2. Begin SSE stream
        streamAudit(jobId);

    } catch (err) {
        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = "Error:\n" + err.message;
    }
}

function streamAudit(jobId) {
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    const streamUrl = `https://portions-proudly-louisville-pan.trycloudflare.com/generate_stream?job_id=${jobId}`;
    const source = new EventSource(streamUrl);

    source.addEventListener("start", () => {
        loading.textContent = "Audit initializing…";
    });

    source.addEventListener("progress", (event) => {
        const data = JSON.parse(event.data);
        loading.textContent = `Processing… Status: ${data.status}`;
    });

    source.addEventListener("complete", (event) => {
        const data = JSON.parse(event.data);
        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = JSON.stringify(data, null, 2);
        source.close();
    });

    source.addEventListener("error", () => {
        loading.style.display = "none";
        result.style.display = "block";
        result.textContent = "Stream error or connection closed.";
        source.close();
    });
}
</script>

</body>
</html>
